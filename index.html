<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Digital Water Doodle</title>
    <style>
        :root { --bg-color: #1a1a1a; }
        
        body, html { 
            background: var(--bg-color); 
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; 
            font-family: sans-serif; 
            touch-action: none; 
        } 

        #main-frame { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100vw; 
            height: 100dvh; 
        } 

        #canvas-container { 
            position: relative; 
            line-height: 0; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border: 4px solid #333; 
            border-radius: 8px; 
            background: #000; 
            width: 85%;
            max-height: 95%;
        } 

        .bg-img { 
            display: block; 
            width: 100%; 
            height: auto; 
            z-index: 1; 
        } 

        #doodleCanvas { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 2; 
        } 

        .nav-arrow { 
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%); 
            z-index: 10; 
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid #555; 
            color: white; 
            font-size: 1.8rem; 
            width: 44px; height: 44px; 
            cursor: pointer; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        } 

        #prevArrow { left: 10px; } 
        #nextArrow { right: 10px; }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>Tap to Start Activity</h2>
    </div>

    <div id="main-frame">
        <button id="prevArrow" class="nav-arrow" onclick="changePage(-1)">&#10094;</button>
        <div id="canvas-container">
            <img src="" id="colorImage" class="bg-img">
            <canvas id="doodleCanvas"></canvas>
        </div>
        <button id="nextArrow" class="nav-arrow" onclick="changePage(1)">&#10095;</button>
    </div>

    <script>
        const canvas = document.getElementById('doodleCanvas');
        const ctx = canvas.getContext('2d');
        const colorImg = document.getElementById('colorImage');
        const overlay = document.getElementById('overlay');

        // Cleaned up array: 4 cartoon-style images
        const drawings = [
            { color: 'doodle_color.png', number: "1" },
            { color: 'doodle2_color.png', number: "2" },
            { color: 'doodle3_color.png', number: "3" },
            { color: 'doodle4_color.png', number: "4" }
        ];

        let currentIndex = 0;

        overlay.addEventListener('click', () => {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }
            overlay.style.display = 'none';
            loadDrawing(0);
        });

        function loadDrawing(index) {
            const drawing = drawings[index];
            colorImg.src = drawing.color;

            const checkDimensions = () => {
                if (colorImg.complete && colorImg.clientWidth > 0) {
                    initCanvas(drawing.number);
                } else {
                    setTimeout(checkDimensions, 10);
                }
            };
            colorImg.onload = checkDimensions;
        }

        function initCanvas(number) {
            canvas.width = colorImg.clientWidth;
            canvas.height = colorImg.clientHeight;
            
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (number) {
                ctx.fillStyle = "#cccccc"; 
                ctx.font = `bold ${Math.floor(canvas.height / 3)}px sans-serif`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(number, canvas.width / 2, canvas.height / 2);
            }
            
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
        }

        function changePage(direction) {
            currentIndex = (currentIndex + direction + drawings.length) % drawings.length;
            loadDrawing(currentIndex);
        }

        function wash(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            
            ctx.beginPath();
            ctx.arc(x, y, 40, 0, Math.PI * 2);
            ctx.fill();
        }

        canvas.addEventListener('mousemove', (e) => { if(e.buttons === 1) wash(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); wash(e); }, {passive: false});
        canvas.addEventListener('mousedown', wash);
        canvas.addEventListener('touchstart', wash);

        window.addEventListener('resize', () => {
            if (overlay.style.display === 'none') {
                initCanvas(drawings[currentIndex].number);
            }
        });
    </script>
</body>
</html>
