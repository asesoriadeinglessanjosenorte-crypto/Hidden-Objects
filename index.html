<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Water Doodle</title>
    <style>
        body { 
            background: #1a1a1a; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            font-family: sans-serif; 
            touch-action: none; 
        } 

        #main-frame { 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100vw; 
            height: 100vh; 
            background: #1a1a1a;
        } 

        #canvas-container { 
            position: relative; 
            line-height: 0; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border: 8px solid #333; 
            border-radius: 8px; 
            background: #000; 
            max-width: 90%; 
            max-height: 90%; 
        } 

        .bg-img { 
            display: block; 
            width: auto; 
            height: auto; 
            max-width: 100%; 
            max-height: 80vh; 
            z-index: 1; 
        } 

        #doodleCanvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 2; 
            cursor: crosshair; 
        } 

        .nav-arrow { 
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%); 
            z-index: 10; 
            background: rgba(68, 68, 68, 0.8); 
            border: none; 
            color: white; 
            font-size: 2rem; 
            width: 50px; 
            height: 50px; 
            cursor: pointer; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            user-select: none; 
        } 

        #prevArrow { left: 10px; } 
        #nextArrow { right: 10px; } 

        /* Adjusts for landscape to give more room */
        @media screen and (orientation: landscape) and (max-height: 500px) { 
            #canvas-container { border: 4px solid #333; } 
            .nav-arrow { width: 40px; height: 40px; font-size: 1.5rem; } 
        }
    </style>
</head>
<body>

    <div id="main-frame">
        <button id="prevArrow" class="nav-arrow" onclick="changePage(-1)">&#10094;</button>
        
        <div id="canvas-container">
            <img src="" id="colorImage" class="bg-img">
            <canvas id="doodleCanvas"></canvas>
        </div>

        <button id="nextArrow" class="nav-arrow" onclick="changePage(1)">&#10095;</button>
    </div>

    <script>
        const canvas = document.getElementById('doodleCanvas');
        const ctx = canvas.getContext('2d');
        const colorImg = document.getElementById('colorImage');
        const mainFrame = document.getElementById('main-frame');

        const drawings = [
            { color: 'doodle_color.png' },
            { color: 'doodle2_color.png' },
            { color: 'doodle3_color.png' }
        ];

        let currentIndex = 0;

        // 1. Function to go Full Screen (Hides the browser bar)
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                mainFrame.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable full-screen: ${err.message}`);
                });
            }
        }

        function loadDrawing(index) {
            const drawing = drawings[index];
            colorImg.src = drawing.color;
            colorImg.onload = () => initCanvas();
        }

        function initCanvas() {
            canvas.width = colorImg.clientWidth;
            canvas.height = colorImg.clientHeight;
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
        }

        function changePage(direction) {
            currentIndex += direction;
            if (currentIndex >= drawings.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = drawings.length - 1;
            loadDrawing(currentIndex);
        }

        function wash(e) {
            // Trigger full screen on the first interaction
            toggleFullScreen();

            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            
            ctx.beginPath();
            ctx.arc(x, y, 35, 0, Math.PI * 2);
            ctx.fill();
        }

        canvas.addEventListener('mousemove', (e) => { if(e.buttons === 1) wash(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); wash(e); }, {passive: false});
        canvas.addEventListener('mousedown', wash);
        canvas.addEventListener('touchstart', wash);

        window.addEventListener('resize', () => {
            // Re-init canvas when exiting/entering full screen to keep sizes correct
            setTimeout(initCanvas, 100); 
        });

        loadDrawing(0);
    </script>
</body>
</html>
